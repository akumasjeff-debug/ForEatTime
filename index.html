<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ForEatTime — 聚餐時間協調</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        * { touch-action: manipulation; }

        .calendar-day { background:#fff; min-height:90px; transition:background .1s; }
        .calendar-day:hover { background:#f8fafc; }

        .time-btn {
            width:100%; padding:4px 2px; margin-bottom:3px;
            font-size:11px; font-weight:800;
            border:2px solid #e2e8f0; border-radius:6px;
            background:#fff; color:#64748b;
            transition:all .15s; cursor:pointer; line-height:1.2;
        }
        .time-btn:active { transform:scale(.95); }
        .time-btn.selected { border-color:#3b82f6; color:#1e40af; background:#eff6ff; box-shadow:0 0 8px rgba(59,130,246,.2); }
        .time-btn.cannot-mode { border-color:#fecaca; color:#dc2626; background:#fff5f5; }
        .time-btn.cannot-mode.selected { border-color:#ef4444; background:#fef2f2; color:#991b1b; box-shadow:0 0 8px rgba(239,68,68,.2); }

        .name-tag { font-size:10px; padding:2px 5px; border-radius:5px; display:flex; justify-content:space-between; align-items:center; color:#fff; margin-bottom:3px; font-weight:700; gap:2px; }
        .slot-tag-0 { background:#f59e0b; }
        .slot-tag-1 { background:#6366f1; }
        .slot-tag-2 { background:#10b981; }
        .slot-tag-3 { background:#f97316; }
        .cannot-tag { background:#94a3b8; }

        #adminAuth { position:fixed; inset:0; background:rgba(15,23,42,.96); z-index:9999; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(6px); }

        .pokemon-chat { background:#fdfdfd; border:3px solid #3b4cca; border-radius:16px; box-shadow:0 4px 0 #2a3582; display:flex; flex-direction:column; overflow:hidden; }
        .chat-header { background:linear-gradient(135deg,#ef4444,#b91c1c); color:#fff; padding:10px 14px; border-bottom:3px solid #3b4cca; font-family:'ZCOOL KuaiLe',cursive; font-size:14px; }
        #chatDisplay { background:#f8fafc; background-image:radial-gradient(#e2e8f0 1px,transparent 1px); background-size:18px 18px; }
        .chat-msg { background:#fff; border:2px solid #fde68a; border-radius:10px; padding:8px 10px; box-shadow:2px 2px 0 #d97706; margin-bottom:8px; }

        .preset-btn { padding:5px 12px; font-size:12px; font-weight:700; border:2px solid #475569; border-radius:20px; background:transparent; color:#94a3b8; cursor:pointer; transition:all .15s; white-space:nowrap; }
        .preset-btn:hover { border-color:#60a5fa; color:#93c5fd; background:rgba(30,58,95,.5); }

        .mode-badge-can { display:inline-flex; align-items:center; gap:6px; background:#eff6ff; border:2px solid #bfdbfe; color:#1d4ed8; border-radius:20px; padding:5px 14px; font-size:13px; font-weight:700; }
        .mode-badge-cannot { display:inline-flex; align-items:center; gap:6px; background:#fef2f2; border:2px solid #fecaca; color:#dc2626; border-radius:20px; padding:5px 14px; font-size:13px; font-weight:700; }
        .presence-chip { font-size:11px; padding:2px 10px; border-radius:20px; background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.3); font-weight:600; }

        @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
        .fade-in { animation:fadeUp .3s ease forwards; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-16 text-slate-800">

<!-- Auth Overlay -->
<div id="adminAuth" style="display:none;">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-80 text-center border-4 border-blue-500 fade-in">
        <div class="text-5xl mb-3">🔐</div>
        <h2 class="text-lg font-black mb-6 text-slate-700">管理員驗證</h2>
        <input type="text" id="authPass" maxlength="3" autocomplete="off"
            class="w-full border-b-4 border-blue-500 p-2 text-center text-5xl font-black tracking-[1.5rem] outline-none mb-8 text-blue-600 bg-transparent"
            onkeypress="if(event.key==='Enter') checkAuth()" placeholder="···">
        <button onclick="checkAuth()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition">確認登入</button>
    </div>
</div>

<!-- Main App -->
<div id="mainApp" style="opacity:0;transition:opacity .4s;">

    <!-- Header -->
    <div class="bg-gradient-to-r from-blue-900 via-blue-800 to-blue-700 p-4 text-white text-center shadow-2xl sticky top-0 z-50">
        <h1 id="topTitle" class="text-xl md:text-2xl font-black tracking-tight">🍴 ForEatTime</h1>
        <div id="presenceList" class="mt-2 flex flex-wrap gap-1 justify-center min-h-5"></div>
    </div>

    <div class="max-w-7xl mx-auto px-3 md:px-6 mt-5">

        <!-- ══════════ SUPER ADMIN ══════════ -->
        <div id="superAdminPanel" class="hidden space-y-5 fade-in">
            <div class="bg-gradient-to-br from-slate-900 to-slate-800 p-6 rounded-3xl text-white border border-indigo-500/30 shadow-2xl">
                <h3 class="text-base font-black mb-5 text-indigo-300">👑 次管帳號管理</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                    <input type="text" id="subAdminName" placeholder="管理員名稱" class="p-3 rounded-xl bg-slate-700 text-white border border-slate-600 outline-none focus:border-indigo-400 placeholder-slate-500">
                    <input type="text" id="subAdminPass" maxlength="3" placeholder="3碼密碼" class="p-3 rounded-xl bg-slate-700 text-white border border-slate-600 outline-none focus:border-indigo-400 text-center tracking-widest placeholder-slate-500">
                    <button onclick="createSubAdmin()" class="bg-indigo-600 hover:bg-indigo-500 rounded-xl font-black text-white transition active:scale-95 py-3">建立次管</button>
                </div>
                <div id="adminTree" class="space-y-4"></div>
            </div>
            <div class="bg-gradient-to-br from-slate-800 to-slate-700 p-6 rounded-3xl text-white border border-blue-500/30 shadow-2xl">
                <h3 class="text-base font-black mb-5 text-blue-300">⚡ 總管直屬活動</h3>
                <div class="flex gap-3 mb-4">
                    <input type="text" id="directGroupName" placeholder="活動名稱" class="flex-1 p-3 rounded-xl bg-slate-600 text-white border border-slate-500 outline-none focus:border-blue-400 font-bold placeholder-slate-400">
                    <button onclick="createDirectGroup()" class="bg-blue-600 hover:bg-blue-500 px-6 rounded-xl font-black transition active:scale-95">建立</button>
                </div>
                <div id="slotConfigSuper"></div>
                <div id="directGroupList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 mt-5"></div>
            </div>
        </div>

        <!-- ══════════ SUB ADMIN ══════════ -->
        <div id="subAdminPanel" class="hidden space-y-5 fade-in">
            <div class="bg-gradient-to-br from-slate-800 to-slate-700 p-6 rounded-3xl text-white border border-blue-600/30 shadow-2xl">
                <h3 class="text-base font-black mb-5 text-blue-300">📌 建立新活動</h3>
                <div class="flex gap-3 mb-4">
                    <input type="text" id="newGroupName" placeholder="例如：春季員工旅遊" class="flex-1 p-3 rounded-xl bg-slate-600 text-white border border-slate-500 outline-none focus:border-blue-400 font-bold placeholder-slate-400">
                    <button onclick="createNewGroup()" class="bg-blue-600 hover:bg-blue-500 px-6 rounded-xl font-black transition active:scale-95">建立</button>
                </div>
                <div id="slotConfigSub"></div>
                <h3 class="font-bold text-blue-300 border-t border-slate-600/50 pt-5 mt-5 mb-4">📋 我的活動清單</h3>
                <div id="subExistingGroups" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
            </div>
        </div>

        <!-- ══════════ USER GROUP VIEW ══════════ -->
        <div id="groupContent" class="hidden space-y-4 fade-in">

            <!-- 名字 (always top) -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border-2 border-slate-100">
                <label class="text-xs font-black text-slate-400 uppercase tracking-widest block mb-2">你的名字</label>
                <input type="text" id="userName" oninput="updatePresenceName()" placeholder="輸入你的名字…"
                    class="w-full border-b-2 border-slate-200 py-2 text-2xl font-black outline-none focus:border-blue-500 transition bg-transparent text-slate-800 placeholder-slate-200">
            </div>

            <!-- 模式提示 -->
            <div class="flex flex-wrap items-center gap-3">
                <span id="modeBadge"></span>
                <span id="slotHints" class="text-xs text-slate-400 font-semibold"></span>
            </div>

            <!-- Grid: mobile → calendar(order-1) 上, chat(order-2) 下 -->
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-5">

                <!-- 左欄: 投票 + 留言板 (order-2 mobile) -->
                <div class="lg:col-span-1 order-2 lg:order-1 space-y-4">
                    <div id="voteSection" class="space-y-3"></div>
                    <div class="pokemon-chat" style="height:400px;">
                        <div class="chat-header font-black">💬 留言板</div>
                        <div id="chatDisplay" class="flex-1 overflow-y-auto p-3"></div>
                        <div class="p-3 bg-white border-t border-slate-100 flex gap-2">
                            <input type="text" id="chatInput" placeholder="說點什麼…"
                                class="flex-1 text-sm outline-none border-b-2 border-slate-100 focus:border-red-400 transition py-1 bg-transparent"
                                onkeypress="if(event.key==='Enter') sendMsg()">
                            <button onclick="sendMsg()" class="bg-red-500 hover:bg-red-400 text-white px-4 py-2 rounded-xl font-black text-xs shadow transition active:scale-95">送出</button>
                        </div>
                    </div>
                </div>

                <!-- 右欄: 月曆 (order-1 mobile) -->
                <div class="lg:col-span-3 order-1 lg:order-2 space-y-4">
                    <div class="flex items-center justify-between bg-white p-4 rounded-2xl border-2 border-slate-100 shadow-sm">
                        <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center bg-slate-100 hover:bg-blue-100 rounded-full transition active:scale-90 font-black text-slate-600 text-lg">❮</button>
                        <div id="currentMonthDisplay" class="text-xl font-black text-slate-800"></div>
                        <button onclick="changeMonth(1)" class="w-10 h-10 flex items-center justify-center bg-slate-100 hover:bg-blue-100 rounded-full transition active:scale-90 font-black text-slate-600 text-lg">❯</button>
                    </div>
                    <div class="grid grid-cols-7 text-center text-xs font-black">
                        <div class="py-2 text-red-500 bg-red-50 rounded-tl-xl">日</div>
                        <div class="py-2 text-slate-500 bg-slate-100">一</div>
                        <div class="py-2 text-slate-500 bg-slate-100">二</div>
                        <div class="py-2 text-slate-500 bg-slate-100">三</div>
                        <div class="py-2 text-slate-500 bg-slate-100">四</div>
                        <div class="py-2 text-slate-500 bg-slate-100">五</div>
                        <div class="py-2 text-blue-500 bg-blue-50 rounded-tr-xl">六</div>
                    </div>
                    <div id="calendarDays" class="grid grid-cols-7 gap-px bg-slate-200 rounded-2xl overflow-hidden shadow-md border-2 border-slate-200"></div>
                    <button id="submitBtn" onclick="submitData()"
                        class="w-full text-white text-xl font-black py-5 rounded-2xl shadow-lg active:scale-95 transition-all bg-gradient-to-r from-red-600 to-red-500 hover:from-red-500 hover:to-red-400">
                        ✅ 確認送出（可以參加）
                    </button>
                    <div id="bestTimeResult" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ─── Firebase ──────────────────────────────────────────────────
const firebaseConfig = {
    apiKey: "AiZaSyCi4_U67UeFutq4Hq3BPJoydC3jdMR8SN0",
    authDomain: "foreattime.firebaseapp.com",
    databaseURL: "https://foreattime-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "foreattime",
    storageBucket: "foreattime.firebasestorage.app",
    messagingSenderId: "592005703271",
    appId: "1:592005703271:web:ba17c12cb2aba9eb8696c2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ─── State ─────────────────────────────────────────────────────
const urlParams   = new URLSearchParams(window.location.search);
const groupID     = urlParams.get('group');
const subAdminID  = urlParams.get('mgr');
let currY, currM, myPresenceRef;
let groupConfig       = { slots:['午餐','晚餐'], mode:'can', voteCategories:[] };
let pendingSlots      = ['午餐','晚餐'];
let pendingVoteCats   = [];

// ─── Init ──────────────────────────────────────────────────────
window.onload = function() {
    if (groupID) startApp();
    else document.getElementById('adminAuth').style.display = 'flex';
};

// ─── Slot Config UI ────────────────────────────────────────────
function renderSlotConfig(containerId, prefix) {
    const el = document.getElementById(containerId); if (!el) return;
    el.innerHTML = `
    <div class="bg-black/20 rounded-2xl p-4 space-y-4 border border-white/10 mb-2">
        <div>
            <div class="text-xs font-black text-slate-400 uppercase tracking-wider mb-2">⏰ 時段設定</div>
            <div class="flex flex-wrap gap-2 mb-3">
                <button onclick="setPresetSlots(['午餐','晚餐'])" class="preset-btn">午餐＋晚餐</button>
                <button onclick="setPresetSlots(['整天'])" class="preset-btn">整天出遊</button>
                <button onclick="setPresetSlots(['上午','下午','晚上'])" class="preset-btn">上午／下午／晚上</button>
                <button onclick="setPresetSlots(['早上','中午','下午','晚上'])" class="preset-btn">全天四段</button>
            </div>
            <div class="slot-tags-container flex flex-wrap gap-1 mb-3 min-h-7 p-2 bg-black/20 rounded-xl"></div>
            <div class="flex gap-2">
                <input type="text" id="csi_${prefix}" placeholder="自訂時段名稱…"
                    class="flex-1 p-2 rounded-lg bg-slate-700 text-white border border-slate-600 text-sm outline-none focus:border-blue-400 placeholder-slate-500"
                    onkeypress="if(event.key==='Enter') addCustomSlot('${prefix}')">
                <button onclick="addCustomSlot('${prefix}')" class="bg-slate-600 hover:bg-slate-500 text-white px-4 rounded-lg text-sm font-bold transition">＋</button>
            </div>
        </div>
        <div>
            <div class="text-xs font-black text-slate-400 uppercase tracking-wider mb-2">📋 登記模式</div>
            <div class="flex flex-wrap gap-5">
                <label class="flex items-center gap-2 text-sm text-white cursor-pointer">
                    <input type="radio" name="rm_${prefix}" value="can" checked class="accent-blue-400">
                    勾選 <strong class="text-blue-300">可以</strong> 參加的時段
                </label>
                <label class="flex items-center gap-2 text-sm text-white cursor-pointer">
                    <input type="radio" name="rm_${prefix}" value="cannot" class="accent-red-400">
                    勾選 <strong class="text-red-300">不能</strong> 參加的時段
                </label>
            </div>
        </div>
        <div>
            <div class="flex items-center gap-2 mb-2">
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="enableVote_${prefix}" onchange="toggleVoteConfig('${prefix}')" class="sr-only peer">
                    <div class="w-9 h-5 bg-slate-600 rounded-full peer peer-checked:bg-amber-500 transition after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:rounded-full after:h-4 after:w-4 after:transition peer-checked:after:translate-x-4"></div>
                </label>
                <span class="text-xs font-black text-slate-300">🗳️ 開啟投票功能（如餐廳、地點）</span>
            </div>
            <div id="voteConfig_${prefix}" class="hidden space-y-2 pl-2 border-l-2 border-amber-500/30">
                <div class="flex flex-wrap gap-2 mb-2">
                    <button onclick="addVoteCat('${prefix}','餐廳')" class="preset-btn text-[11px] py-1">＋ 餐廳</button>
                    <button onclick="addVoteCat('${prefix}','地點')" class="preset-btn text-[11px] py-1">＋ 地點</button>
                    <button onclick="addVoteCat('${prefix}','主題')" class="preset-btn text-[11px] py-1">＋ 主題</button>
                    <button onclick="addVoteCat('${prefix}','活動')" class="preset-btn text-[11px] py-1">＋ 活動</button>
                </div>
                <div class="vote-cats-container flex flex-wrap gap-1 mb-2 min-h-6"></div>
                <div class="flex gap-2">
                    <input type="text" id="vci_${prefix}" placeholder="自訂投票類別（如：KTV、民宿）"
                        class="flex-1 p-2 rounded-lg bg-slate-700 text-white border border-slate-600 text-xs outline-none focus:border-amber-400 placeholder-slate-500"
                        onkeypress="if(event.key==='Enter') addVoteCat('${prefix}',document.getElementById('vci_${prefix}').value)">
                    <button onclick="addVoteCat('${prefix}',document.getElementById('vci_${prefix}').value)"
                        class="bg-amber-600 hover:bg-amber-500 text-white px-3 rounded-lg text-xs font-bold transition">＋</button>
                </div>
            </div>
        </div>
    </div>`;
    renderSlotTags();
    renderVoteCatTags();
}

function toggleVoteConfig(prefix) {
    const cfg = document.getElementById('voteConfig_' + prefix);
    const cb  = document.getElementById('enableVote_' + prefix);
    if (cb.checked) cfg.classList.remove('hidden');
    else { cfg.classList.add('hidden'); pendingVoteCats = []; renderVoteCatTags(); }
}

// Slot helpers
function setPresetSlots(slots) { pendingSlots = [...slots]; renderSlotTags(); }
function addCustomSlot(prefix) {
    const input = document.getElementById('csi_' + prefix); if (!input) return;
    const val = input.value.trim(); if (!val || pendingSlots.includes(val)) { input.value=''; return; }
    pendingSlots.push(val); input.value=''; renderSlotTags();
}
function removeSlot(idx) { pendingSlots.splice(idx,1); renderSlotTags(); }
function renderSlotTags() {
    const html = pendingSlots.length
        ? pendingSlots.map((s,i)=>`<span class="inline-flex items-center gap-1 bg-blue-700 text-white text-xs px-3 py-1 rounded-full font-bold">${s}<button onclick="removeSlot(${i})" class="ml-1 opacity-60 hover:opacity-100 text-sm leading-none">×</button></span>`).join('')
        : '<span class="text-slate-500 text-xs italic">（尚未設定）</span>';
    document.querySelectorAll('.slot-tags-container').forEach(el => el.innerHTML = html);
}

// Vote category helpers
function addVoteCat(prefix, name) {
    name = (name||'').trim(); if (!name || pendingVoteCats.includes(name)) return;
    const inp = document.getElementById('vci_' + prefix); if (inp) inp.value='';
    pendingVoteCats.push(name); renderVoteCatTags();
}
function removeVoteCat(idx) { pendingVoteCats.splice(idx,1); renderVoteCatTags(); }
function renderVoteCatTags() {
    const html = pendingVoteCats.length
        ? pendingVoteCats.map((s,i)=>`<span class="inline-flex items-center gap-1 bg-amber-600 text-white text-xs px-3 py-1 rounded-full font-bold">🗳️ ${s}<button onclick="removeVoteCat(${i})" class="ml-1 opacity-60 hover:opacity-100 text-sm leading-none">×</button></span>`).join('')
        : '<span class="text-slate-500 text-xs italic">（未啟用）</span>';
    document.querySelectorAll('.vote-cats-container').forEach(el => el.innerHTML = html);
}

function getMode(prefix) { const r = document.querySelector('input[name="rm_'+prefix+'"]:checked'); return r ? r.value : 'can'; }

// ─── Auth ──────────────────────────────────────────────────────
function checkAuth() {
    const pass = document.getElementById('authPass').value.trim();
    if (subAdminID) {
        db.ref('sub_admins/'+subAdminID).once('value', snap => {
            if (snap.val() && snap.val().password === pass) { document.getElementById('adminAuth').style.display='none'; startApp(false,true); }
            else alert('次管密碼錯誤');
        });
    } else {
        if (pass === '666') { document.getElementById('adminAuth').style.display='none'; startApp(true,false); }
        else alert('總管密碼錯誤');
    }
}

// ─── App Start ─────────────────────────────────────────────────
function startApp(isSuper, isSub) {
    document.getElementById('mainApp').style.opacity = '1';
    const now = new Date(); currY = now.getFullYear(); currM = now.getMonth()+1;

    if (isSuper) {
        document.getElementById('superAdminPanel').classList.remove('hidden');
        document.getElementById('topTitle').innerText = '🏰 總管理員中心';
        renderSlotConfig('slotConfigSuper','super');
        fetchAdminTree(); fetchDirectGroupList();
    } else if (isSub) {
        document.getElementById('subAdminPanel').classList.remove('hidden');
        renderSlotConfig('slotConfigSub','sub');
        db.ref('sub_admins/'+subAdminID).once('value', snap => {
            document.getElementById('topTitle').innerText = '📌 '+snap.val().name+' 的管理中心';
        });
        fetchSubGroupList();
    } else if (groupID) {
        document.getElementById('groupContent').classList.remove('hidden');
        db.ref('group_list/'+groupID).once('value', snap => {
            const data = snap.val() || {};
            groupConfig = { slots: data.slots||['午餐','晚餐'], mode: data.mode||'can', voteCategories: data.voteCategories||[] };
            document.getElementById('topTitle').innerText = '🍴 '+(data.displayName||groupID);
            renderModeIndicator();
            renderVotePanels();
            renderCalendar();
        });
        syncChat(); setupPresence();
    }
}

// ─── Mode Indicator ────────────────────────────────────────────
function renderModeIndicator() {
    const isCannot = groupConfig.mode === 'cannot';
    const badge = document.getElementById('modeBadge');
    badge.className = isCannot ? 'mode-badge-cannot' : 'mode-badge-can';
    badge.innerHTML  = isCannot ? '🚫 標記<strong>不能</strong>參加的時段' : '✅ 標記<strong>可以</strong>參加的時段';
    document.getElementById('slotHints').textContent = '時段：'+groupConfig.slots.join(' / ');
    const btn = document.getElementById('submitBtn');
    if (isCannot) {
        btn.textContent = '❌ 確認送出（不能參加）';
        btn.className = btn.className.replace('from-red-600 to-red-500 hover:from-red-500 hover:to-red-400','from-orange-600 to-orange-500 hover:from-orange-500 hover:to-orange-400');
    }
}

// ─── Vote Panels (user view) ───────────────────────────────────
function renderVotePanels() {
    const cats = groupConfig.voteCategories || [];
    const sec  = document.getElementById('voteSection');
    if (!cats.length) { sec.innerHTML=''; return; }
    sec.innerHTML = cats.map(cat => `
        <div class="bg-amber-50 border-2 border-amber-100 p-4 rounded-2xl shadow-sm">
            <div class="font-black text-amber-800 mb-3 text-sm flex items-center gap-1">🗳️ ${cat} 投票</div>
            <div id="vpool_${safeId(cat)}" class="space-y-2 mb-3 max-h-44 overflow-y-auto"></div>
            <div class="flex gap-2">
                <input type="text" id="vnew_${safeId(cat)}" placeholder="新增${cat}選項…"
                    class="flex-1 text-xs p-2 rounded-xl outline-none border-2 border-amber-200 bg-white focus:border-amber-400 transition"
                    onkeypress="if(event.key==='Enter') addVoteItem('${cat}')">
                <button onclick="addVoteItem('${cat}')" class="bg-amber-500 hover:bg-amber-400 text-white px-3 rounded-xl font-bold text-xs transition active:scale-95">新增</button>
            </div>
        </div>`).join('');
    cats.forEach(cat => syncVotes(cat));
}

function safeId(str) { return str.replace(/[^a-zA-Z0-9一-鿿]/g,'_'); }

function syncVotes(cat) {
    db.ref('groups/'+groupID+'/votes/'+cat).on('value', snap => {
        const pool = document.getElementById('vpool_'+safeId(cat)); if (!pool) return;
        const items = snap.val() || {};
        const sorted = Object.entries(items).sort((a,b) => (b[1].count||0)-(a[1].count||0));
        pool.innerHTML = sorted.length
            ? sorted.map(([name, info]) => `
                <div class="bg-white p-2.5 rounded-xl border border-amber-200 flex justify-between items-center shadow-sm">
                    <div>
                        <span class="font-black text-xs text-slate-700">${name}</span>
                        <span class="text-amber-600 font-bold text-xs ml-2">❤️ ${info.count||0}</span>
                    </div>
                    <div class="flex gap-2 ml-2">
                        <button onclick="voteItem('${cat}','${name.replace(/'/g,"&apos;")}')" class="text-xs bg-red-100 hover:bg-red-200 text-red-600 font-bold px-2 py-1 rounded-lg transition">+1</button>
                        <button onclick="delVoteItem('${cat}','${name.replace(/'/g,"&apos;")}')" class="text-slate-300 hover:text-slate-400 text-xs">✕</button>
                    </div>
                </div>`).join('')
            : '<p class="text-slate-300 text-xs text-center py-2 italic">還沒有選項</p>';
    });
}

function addVoteItem(cat) {
    const inp = document.getElementById('vnew_'+safeId(cat)); if (!inp) return;
    const name = inp.value.trim(); if (!name) return;
    db.ref('groups/'+groupID+'/votes/'+cat+'/'+name).set({ count:0 });
    inp.value = '';
}
function voteItem(cat, name) {
    const user = document.getElementById('userName').value.trim() || '秘密客';
    db.ref('groups/'+groupID+'/votes/'+cat+'/'+name+'/voters/'+user).transaction(c => (c||0)+1);
    db.ref('groups/'+groupID+'/votes/'+cat+'/'+name+'/count').transaction(c => (c||0)+1);
}
function delVoteItem(cat, name) {
    if (confirm('刪除「'+name+'」？')) db.ref('groups/'+groupID+'/votes/'+cat+'/'+name).remove();
}

// ─── Super Admin ───────────────────────────────────────────────
function createDirectGroup() {
    const name = document.getElementById('directGroupName').value.trim(); if (!name) return;
    if (!pendingSlots.length) return alert('請至少設定一個時段');
    const gid = 'super_'+Math.random().toString(36).substring(2,8);
    db.ref('group_list/'+gid).set({ displayName:name, owner:'super_admin', createdAt:Date.now(), slots:pendingSlots, mode:getMode('super'), voteCategories:pendingVoteCats });
    document.getElementById('directGroupName').value = '';
}

function fetchDirectGroupList() {
    db.ref('group_list').on('value', snap => {
        const list = document.getElementById('directGroupList'); list.innerHTML='';
        Object.entries(snap.val()||{}).forEach(([id,info]) => {
            if (!info.owner || info.owner==='super_admin') list.innerHTML += buildGroupCard(id,info);
        });
    });
}

function createSubAdmin() {
    const name = document.getElementById('subAdminName').value.trim();
    const pass = document.getElementById('subAdminPass').value.trim();
    if (!name || pass.length!==3) return alert('需3位密碼');
    const id = 'mgr_'+Math.random().toString(36).substring(2,7);
    db.ref('sub_admins/'+id).set({ name, password:pass, createdAt:Date.now() });
    document.getElementById('subAdminName').value=''; document.getElementById('subAdminPass').value='';
}

function fetchAdminTree() {
    db.ref('sub_admins').on('value', snap => {
        const tree = document.getElementById('adminTree'); tree.innerHTML='';
        Object.entries(snap.val()||{}).forEach(([mgrId,info]) => {
            const mgrUrl = window.location.origin+window.location.pathname+'?mgr='+mgrId;
            tree.innerHTML += `
            <div class="bg-white rounded-2xl border-l-4 border-indigo-500 shadow overflow-hidden">
                <div class="p-4 flex justify-between items-center bg-indigo-50">
                    <span class="text-indigo-800 font-black text-sm">👤 ${info.name} <span class="text-xs bg-indigo-100 px-2 py-0.5 rounded-full ml-2">密碼: ${info.password}</span></span>
                    <button onclick="if(confirm('刪除次管？')) db.ref('sub_admins/${mgrId}').remove()" class="text-red-400 text-xs px-3 py-1 border border-red-200 rounded-lg hover:bg-red-50 transition">刪除</button>
                </div>
                <div class="px-4 py-2 bg-slate-50 text-[10px] font-mono text-indigo-400 break-all border-b border-slate-100">${mgrUrl}</div>
                <div class="p-4 grid grid-cols-1 md:grid-cols-3 gap-2" id="tg-${mgrId}"></div>
            </div>`;
            db.ref('group_list').orderByChild('owner').equalTo(mgrId).on('value', gSnap => {
                const gList = document.getElementById('tg-'+mgrId); if (!gList) return;
                gList.innerHTML='';
                Object.entries(gSnap.val()||{}).forEach(([gid,g]) => {
                    const gUrl = window.location.origin+window.location.pathname+'?group='+gid;
                    gList.innerHTML += `<div class="bg-white p-3 rounded-xl border flex justify-between items-center text-sm">
                        <a href="${gUrl}" target="_blank" class="truncate flex-1 font-bold hover:text-blue-600">🔗 ${g.displayName}</a>
                        <div class="flex gap-2 ml-2 shrink-0">
                            <button onclick="clearGroupData('${gid}')" class="text-amber-500 text-xs hover:text-amber-600 font-bold">清空</button>
                            <button onclick="if(confirm('確定刪除？')) db.ref('group_list/${gid}').remove()" class="text-red-500 font-bold">✕</button>
                        </div>
                    </div>`;
                });
            });
        });
    });
}

// ─── Sub Admin ─────────────────────────────────────────────────
function createNewGroup() {
    const name = document.getElementById('newGroupName').value.trim(); if (!name) return;
    if (!pendingSlots.length) return alert('請至少設定一個時段');
    const gid = 'gp_'+Math.random().toString(36).substring(2,8);
    db.ref('group_list/'+gid).set({ displayName:name, owner:subAdminID, createdAt:Date.now(), slots:pendingSlots, mode:getMode('sub'), voteCategories:pendingVoteCats });
    document.getElementById('newGroupName').value = '';
}

function fetchSubGroupList() {
    db.ref('group_list').orderByChild('owner').equalTo(subAdminID).on('value', snap => {
        const list = document.getElementById('subExistingGroups'); list.innerHTML='';
        Object.entries(snap.val()||{}).forEach(([id,info]) => { list.innerHTML += buildGroupCard(id,info); });
    });
}

// ─── Shared: Group Card ────────────────────────────────────────
function buildGroupCard(id, info) {
    const url      = window.location.origin+window.location.pathname+'?group='+id;
    const slots    = (info.slots||['午餐','晚餐']).join('・');
    const modeHtml = info.mode==='cannot' ? '<span class="text-red-300 font-black">標記不能</span>' : '<span class="text-green-300 font-black">標記可以</span>';
    const voteHtml = (info.voteCategories||[]).length
        ? '<div>投票：'+(info.voteCategories||[]).map(c=>'🗳️'+c).join(' ')+'</div>' : '';
    return `
    <div class="bg-white/10 backdrop-blur border border-white/20 p-4 rounded-2xl shadow-lg flex flex-col gap-3">
        <div class="flex justify-between items-start gap-2">
            <span class="font-black text-white text-sm leading-snug">${info.displayName}</span>
            <button onclick="if(confirm('刪除此活動？')) db.ref('group_list/${id}').remove()" class="text-red-400 hover:text-red-300 shrink-0 font-bold">✕</button>
        </div>
        <div class="text-[10px] text-slate-300 space-y-0.5">
            <div>時段：${slots}</div><div>模式：${modeHtml}</div>${voteHtml}
        </div>
        <div class="text-[9px] text-slate-500 font-mono truncate">${url}</div>
        <div class="flex gap-2">
            <a href="${url}" target="_blank" class="flex-1 bg-blue-600 hover:bg-blue-500 text-center py-2.5 rounded-xl text-xs font-black text-white transition active:scale-95">進入活動</a>
            <button onclick="clearGroupData('${id}')" class="bg-amber-600/20 hover:bg-amber-600/40 border border-amber-500/40 text-amber-300 px-3 rounded-xl text-xs font-bold transition" title="清空登記資料">🗑️</button>
        </div>
    </div>`;
}

function clearGroupData(gid) {
    if (confirm('確定清空此活動的所有登記、訊息與投票資料？\n（活動本身保留）')) db.ref('groups/'+gid).set(null);
}

// ─── Calendar ──────────────────────────────────────────────────
function renderCalendar() {
    const slots = groupConfig.slots||['午餐','晚餐'];
    const isCannot = groupConfig.mode==='cannot';
    document.getElementById('currentMonthDisplay').innerText = currY+' 年 '+String(currM).padStart(2,'0')+' 月';
    const first = new Date(currY,currM-1,1).getDay();
    const days  = new Date(currY,currM,0).getDate();
    const c = document.getElementById('calendarDays'); c.innerHTML='';
    for (let i=0;i<first;i++) c.innerHTML += '<div class="bg-slate-50 min-h-[80px]"></div>';
    for (let d=1;d<=days;d++) {
        const w = new Date(currY,currM-1,d).getDay();
        const nc = w===0 ? 'text-red-500' : w===6 ? 'text-blue-500' : 'text-slate-600';
        const btns = slots.map((slot,i)=>`<button class="time-btn${isCannot?' cannot-mode':''}" data-day="${d}" data-time="${slot}" onclick="toggleSelection(this)">${slot}</button><div id="s${i}-${d}"></div>`).join('');
        c.innerHTML += `<div class="calendar-day p-1.5 flex flex-col"><span class="text-sm font-black ${nc} mb-1 pb-1 border-b border-slate-100 leading-none">${d}</span>${btns}</div>`;
    }
    syncData();
}

function toggleSelection(el) {
    el.classList.toggle('selected');
    el.innerText = el.classList.contains('selected') ? '✓ '+el.getAttribute('data-time') : el.getAttribute('data-time');
}

// ─── Data Sync ─────────────────────────────────────────────────
function syncData() {
    const mKey = currY+'-'+String(currM).padStart(2,'0');
    const slots = groupConfig.slots||['午餐','晚餐'];
    const isCannot = groupConfig.mode==='cannot';
    db.ref('groups/'+groupID+'/registrations').on('value', snap => {
        slots.forEach((_,i) => document.querySelectorAll('[id^="s'+i+'-"]').forEach(el => el.innerHTML=''));
        const stats = {};
        Object.entries(snap.val()||{}).forEach(([id,reg]) => {
            if (reg.month !== mKey) return;
            (reg.selections||[]).forEach(sel => {
                const idx = slots.indexOf(sel.time); if (idx===-1) return;
                const target = document.getElementById('s'+idx+'-'+sel.day);
                if (target) {
                    const cls = isCannot ? 'cannot-tag' : 'slot-tag-'+(idx%4);
                    target.innerHTML += `<div class="name-tag ${cls}"><span class="truncate">${reg.name}</span><button onclick="deleteReg('${id}','${sel.day}','${sel.time}')" class="opacity-60 hover:opacity-100 shrink-0 ml-1">✕</button></div>`;
                }
                const sk = sel.day+'日('+sel.time+')';
                if (!stats[sk]) stats[sk]=[]; stats[sk].push(reg.name);
            });
        });
        calculateBestTime(stats);
    });
}

// ─── Best Time ─────────────────────────────────────────────────
function calculateBestTime(stats) {
    const div = document.getElementById('bestTimeResult');
    const isCannot = groupConfig.mode==='cannot';
    const sorted = Object.entries(stats).sort((a,b)=>b[1].length-a[1].length);
    if (!sorted.length) { div.innerHTML=''; return; }
    if (isCannot) {
        const minP = sorted[sorted.length-1][1].length;
        div.innerHTML = '<p class="col-span-2 text-xs font-black text-slate-400 uppercase tracking-wider">衝突最少時段</p>';
        sorted.filter(s=>s[1].length===minP).forEach(([time,names]) => {
            div.innerHTML += `<div class="bg-orange-50 border-2 border-orange-100 p-4 rounded-2xl"><div class="flex justify-between items-center mb-1"><span class="font-black text-orange-700">${time}</span><span class="bg-orange-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">${names.length}人衝突</span></div><div class="text-[11px] text-slate-500">衝突者：${names.join(', ')}</div></div>`;
        });
    } else {
        const maxP = sorted[0][1].length;
        div.innerHTML = '<p class="col-span-2 text-xs font-black text-slate-400 uppercase tracking-wider">最多人可以參加</p>';
        sorted.filter(s=>s[1].length===maxP).forEach(([time,names]) => {
            div.innerHTML += `<div class="bg-blue-50 border-2 border-blue-100 p-4 rounded-2xl"><div class="flex justify-between items-center mb-1"><span class="font-black text-blue-700">${time}</span><span class="bg-blue-600 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">${names.length}人</span></div><div class="text-[11px] text-slate-500">名單：${names.join(', ')}</div></div>`;
        });
    }
}

// ─── Presence & Chat ───────────────────────────────────────────
function setupPresence() {
    myPresenceRef = db.ref('groups/'+groupID+'/presence').push();
    db.ref('.info/connected').on('value', snap => {
        if (snap.val()) { myPresenceRef.onDisconnect().remove(); updatePresenceName(); }
    });
    db.ref('groups/'+groupID+'/presence').on('value', snap => {
        const el = document.getElementById('presenceList'); el.innerHTML='';
        Object.values(snap.val()||{}).forEach(u => { el.innerHTML += '<span class="presence-chip">'+u.name+'</span>'; });
    });
}
function updatePresenceName() { if (myPresenceRef) myPresenceRef.set({ name: document.getElementById('userName').value.trim()||'秘密客' }); }
function sendMsg() {
    const name = document.getElementById('userName').value.trim()||'秘密客';
    const text = document.getElementById('chatInput').value.trim(); if (!text) return;
    db.ref('groups/'+groupID+'/messages').push({ name, text, time:Date.now() });
    document.getElementById('chatInput').value='';
}
function syncChat() {
    db.ref('groups/'+groupID+'/messages').limitToLast(30).on('value', snap => {
        const display = document.getElementById('chatDisplay'); display.innerHTML='';
        Object.values(snap.val()||{}).forEach(m => {
            display.innerHTML += `<div class="chat-msg"><div class="text-[9px] font-black text-blue-600 mb-0.5">▼ ${m.name}</div><div class="text-sm text-slate-700">${m.text}</div></div>`;
        });
        display.scrollTop = display.scrollHeight;
    });
}

// ─── Registration CRUD ─────────────────────────────────────────
function deleteReg(regId, d, t) {
    if (!confirm('確定移除這筆登記？')) return;
    const ref = db.ref('groups/'+groupID+'/registrations/'+regId);
    ref.once('value').then(snap => {
        const val = snap.val(); if (!val) return;
        const filtered = (val.selections||[]).filter(s => !(s.day==d && s.time==t));
        if (filtered.length) ref.update({ selections:filtered }); else ref.remove();
    });
}
function changeMonth(dir) {
    currM += dir;
    if (currM>12) { currM=1; currY++; } if (currM<1) { currM=12; currY--; }
    renderCalendar();
}
function submitData() {
    const n = document.getElementById('userName').value.trim(); if (!n) return alert('請先輸入你的名字');
    const sel = [];
    document.querySelectorAll('.time-btn.selected').forEach(b => { sel.push({ day:b.getAttribute('data-day'), time:b.getAttribute('data-time') }); });
    if (!sel.length) return alert('請至少選擇一個時段');
    db.ref('groups/'+groupID+'/registrations').push({ name:n, month:currY+'-'+String(currM).padStart(2,'0'), selections:sel, timestamp:Date.now() }).then(() => {
        alert('✅ 登記成功！');
        document.querySelectorAll('.time-btn').forEach(b => { b.classList.remove('selected'); b.innerText=b.getAttribute('data-time'); });
    });
}
</script>
